<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ink</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      background: #080612;
      color: #f0ecf8;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.18) 0%, transparent 70%);
      top: -120px; left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
    }

    .content { position: relative; z-index: 1; }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
    }

    .nav-left { display: flex; align-items: center; gap: 9px; }

    .logo-box {
      width: 38px; height: 38px;
      background: white;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .logo-box img { width: 28px; height: 28px; object-fit: contain; }

    .nav-name {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.01em;
    }

    .badge-active {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      color: #10b981;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      padding: 3px 8px; border-radius: 20px;
    }

    /* ── Input section ── */
    .input-section {
      padding: 0 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .input-label {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 8px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .addr-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: 10px;
      padding: 10px 13px;
      color: #f0ecf8;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11.5px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .addr-input::placeholder {
      color: rgba(255,255,255,0.2);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
    }
    .addr-input:focus {
      border-color: rgba(139,92,246,0.55);
      background: rgba(139,92,246,0.07);
    }

    .btn-analyze {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none;
      border-radius: 10px;
      padding: 0 16px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(124,58,237,0.35);
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-analyze:hover { opacity: 0.88; }
    .btn-analyze:active { transform: scale(0.96); }

    /* ── Result area ── */
    .result-area {
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 10px 0;
    }
    .empty-icon {
      font-size: 36px;
      margin-bottom: 10px;
      opacity: 0.25;
      filter: grayscale(1);
    }
    .empty-text {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      line-height: 1.6;
    }

    /* Loading */
    .loading-state {
      text-align: center;
    }
    .spinner-ring {
      width: 44px; height: 44px;
      border: 3px solid rgba(124,58,237,0.15);
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }

    /* Result card */
    .result-card {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* High risk pulsing border */
    .result-card.risk-high {
      border-color: rgba(244,63,94,0.3);
      box-shadow: 0 0 0 1px rgba(244,63,94,0.1), 0 0 20px rgba(244,63,94,0.08);
      animation: fadeUp 0.25s ease, pulseBorder 2s ease-in-out infinite;
    }
    @keyframes pulseBorder {
      0%, 100% { box-shadow: 0 0 0 1px rgba(244,63,94,0.1), 0 0 20px rgba(244,63,94,0.08); }
      50%       { box-shadow: 0 0 0 1px rgba(244,63,94,0.25), 0 0 30px rgba(244,63,94,0.15); }
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .score-block { display: flex; align-items: baseline; gap: 6px; }
    .score-num {
      font-size: 52px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .score-denom {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.3);
      padding-bottom: 4px;
    }
    .score-low    { color: #10b981; }
    .score-medium { color: #f59e0b; }
    .score-high   { color: #f43f5e; }

    .card-right { text-align: right; }
    .level-badge {
      display: inline-block;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 20px;
      margin-bottom: 6px;
    }
    .badge-low    { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
    .badge-medium { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
    .badge-high   { background: rgba(244,63,94,0.15);  color: #f43f5e; border: 1px solid rgba(244,63,94,0.3); }

    .token-name {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      font-weight: 500;
    }

    /* Divider */
    .card-divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin-bottom: 12px;
    }

    /* Warnings */
    .warnings { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
    .warning {
      display: flex; gap: 8px; align-items: flex-start;
      font-size: 11.5px; color: rgba(240,236,248,0.65); line-height: 1.4;
    }
    .warn-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(245,158,11,0.85);
      flex-shrink: 0; margin-top: 5px;
    }
    .warn-dot.high { background: rgba(244,63,94,0.85); }

    /* Open in app button */
    .btn-open-app {
      width: 100%;
      padding: 9px;
      background: rgba(139,92,246,0.1);
      border: 1px solid rgba(139,92,246,0.25);
      border-radius: 9px;
      color: rgba(167,139,250,0.9);
      font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-open-app:hover {
      background: rgba(139,92,246,0.18);
      border-color: rgba(139,92,246,0.45);
    }

    /* Error */
    .error-state {
      text-align: center;
    }
    .error-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.6; }
    .error-text { font-size: 12px; color: rgba(244,63,94,0.8); }

    /* ── Footer ── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .footer-label { font-size: 10px; color: rgba(255,255,255,0.18); letter-spacing: 0.03em; }

    .lang-toggle {
      display: flex;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 7px; overflow: hidden;
    }
    .lang-btn {
      padding: 4px 11px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
      cursor: pointer; border: none; background: none;
      color: rgba(255,255,255,0.3);
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }
    .lang-btn.active {
      background: rgba(124,58,237,0.35);
      color: #e9d5ff;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="content">

    <nav>
      <div class="nav-left">
        <div class="logo-box"><img src="icons/icon-48.png" alt="Ink" /></div>
        <span class="nav-name">Ink</span>
      </div>
      <span class="badge-active">ACTIVE</span>
    </nav>

    <div class="input-section">
      <div class="input-label">Contract address</div>
      <div class="input-row">
        <input class="addr-input" id="addr-input" type="text"
          placeholder="0x… paste any Avalanche contract" spellcheck="false" />
        <button class="btn-analyze" id="btn-analyze">Analyze</button>
      </div>
    </div>

    <div class="result-area" id="result-area">
      <div class="empty-state" id="state-empty">
        <div class="empty-icon">🐙</div>
        <div class="empty-text">Paste a contract address<br/>to analyze its risk</div>
      </div>

      <div class="loading-state" id="state-loading" style="display:none">
        <div class="spinner-ring"></div>
        <div class="loading-text">Analyzing contract…</div>
      </div>

      <div id="state-result" style="display:none; width:100%">
        <div class="result-card" id="result-card">
          <div class="card-top">
            <div class="score-block">
              <span class="score-num" id="res-score">—</span>
              <span class="score-denom">/100</span>
            </div>
            <div class="card-right">
              <div class="level-badge" id="res-level">—</div>
              <div class="token-name" id="res-token"></div>
            </div>
          </div>
          <div class="card-divider"></div>
          <div class="warnings" id="res-warnings"></div>
          <button class="btn-open-app" id="btn-open-app">Open full analysis →</button>
        </div>
      </div>

      <div class="error-state" id="state-error" style="display:none">
        <div class="error-icon">⚠️</div>
        <div class="error-text" id="error-text">Could not analyze this contract.</div>
      </div>
    </div>

    <footer>
      <span class="footer-label">Avalanche C-Chain</span>
      <span class="footer-label">Powered by Groq · Llama 3.3</span>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
